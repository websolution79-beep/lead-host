<!doctype html>
<html lang="it">
  <body style="margin:0;background:#f7f8fa;font-family:Arial,sans-serif;color:#0f172a;">
    <main style="max-width:640px;margin:0 auto;padding:32px 18px;">
      <section style="background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:28px;">
        <p style="margin:0 0 18px;color:#047857;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;">
          Lead Host
        </p>
        <h1 style="margin:0 0 16px;font-size:28px;line-height:1.15;">
          Conferma il tuo account Lead Host
        </h1>
        <p style="margin:0;color:#475569;font-size:16px;line-height:1.7;">
          Conferma il tuo indirizzo email per completare la registrazione gratuita a Lead Host.
        </p>
        <p style="margin:26px 0 0;">
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#047857;color:#ffffff;text-decoration:none;font-weight:700;border-radius:10px;padding:13px 18px;">
            Conferma email
          </a>
        </p>
        <p style="margin:22px 0 0;color:#64748b;font-size:14px;line-height:1.6;">
          Se non hai richiesto tu questa registrazione, puoi ignorare questa email.
        </p>
      </section>
      <p style="margin:18px 0 0;text-align:center;color:#94a3b8;font-size:12px;">
        Email transazionale inviata da Lead Host.
      </p>
    </main>
  </body>
</html>
